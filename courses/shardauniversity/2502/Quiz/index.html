<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Portal</title>

<style>
body {font-family:Arial;background:#f4f6f9;margin:0}
.header {background:#007bff;color:white;padding:10px;text-align:center}
.timer {background:#fff3cd;padding:8px;text-align:center;font-weight:bold}
.card {background:white;padding:15px;margin:10px;border-radius:10px}
button {padding:10px;width:100%;margin-top:10px}
.option {display:block;padding:10px;margin:5px 0;background:#eee;border-radius:6px}
</style>
</head>

<body>

<div class="header">Online Quiz</div>
<div class="timer" id="timer"></div>
<div id="app"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbzpj1VcM2W7NS2SNK4vCn-OMtuBR4_UZqLXozJ72WJSykuNFMvTy2rdYxcU8Gpj44lK/exec";
const KEY="QUIZ123";

let studentId,email,questions=[],answers=[];
let current=0,timeLeft=0,sessionId="";
let submitted=false;

// LOGIN UI
function showLogin(){
 app.innerHTML=`
 <div class="card">
  <input id="id" placeholder="ID"><br><br>
  <input id="code" placeholder="Code"><br><br>
  <button onclick="login()">Start</button>
 </div>`;
}

// LOGIN
async function login(){
 studentId=id.value.trim();
 let code=document.getElementById("code").value.trim();

 let res=await fetch(API,{
  method:"POST",
  body:JSON.stringify({action:"login",id:studentId,code,key:KEY})
 });

 let data=await res.json();

 if(data.status==="not_started"){
  alert("Starts at: "+new Date(data.start).toLocaleString('en-IN'));
  return;
 }

 if(data.status==="ended") return alert("Quiz ended");
 if(data.status==="fail") return alert("Invalid");

 sessionId=data.session;
 email=data.email;

 startQuiz(data);
}

// START QUIZ
async function startQuiz(data){

 let startTime=new Date(data.start);
 let endTime=new Date(data.end);

 let now=new Date().getTime();
 timeLeft=Math.floor((endTime.getTime()-now)/1000);

 app.innerHTML=`
 <div class="card">
 Start: ${startTime.toLocaleString('en-IN')}<br>
 End: ${endTime.toLocaleString('en-IN')}
 </div>
 <div class="card" id="qbox"></div>
 <button onclick="next()">Next</button>
 <button onclick="submitQuiz()">Submit</button>
 `;

 let res=await fetch(API,{
  method:"POST",
  body:JSON.stringify({action:"getQuestions",key:KEY})
 });

 questions=await res.json();
 showQ();
 startTimer();
}

// SHOW QUESTION
function showQ(){
 let q=questions[current];
 let html=`<b>${q[1]}</b><br>`;

 for(let i=2;i<=5;i++){
  html+=`<label class="option">
  <input type="radio" onclick="save('${q[0]}','${q[i]}')"> ${q[i]}
  </label>`;
 }

 qbox.innerHTML=html;
}

// SAVE
function save(qid,ans){
 answers=answers.filter(a=>a.q_id!==qid);
 answers.push({q_id:qid,answer:ans});
}

// NEXT
function next(){
 if(current<questions.length-1){
  current++;
  showQ();
 }
}

// TIMER
function startTimer(){
 setInterval(()=>{
  timeLeft--;

  let m=Math.floor(timeLeft/60);
  let s=timeLeft%60;

  timer.innerText=`Time: ${m}:${s<10?'0'+s:s}`;

  if(timeLeft<=0) submitQuiz();
 },1000);
}

// SUBMIT
async function submitQuiz(){

 if(submitted) return;
 submitted=true;

 let res=await fetch(API,{
  method:"POST",
  body:JSON.stringify({
    action:"submit",
    student_id:studentId,
    email:email,
    answers,
    tab_switch:0,
    key:KEY
  })
 });

 let data=await res.json();

 document.body.innerHTML=`<h1 align="center">Score: ${data.score}</h1>`;
}

showLogin();

</script>

</body>
</html>

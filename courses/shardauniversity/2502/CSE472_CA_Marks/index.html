<!DOCTYPE html> 
<html>
<head>
<title>CSE472 and CSP472 CA Marks</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
text-align:center;
padding:50px;
}

.container{
background:white;
padding:30px;
width:480px;
margin:auto;
border-radius:10px;
box-shadow:0px 0px 15px rgba(0,0,0,0.1);
}

input,select{
padding:10px;
width:90%;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:10px 25px;
background:#004aad;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

.result-card{
margin-top:20px;
padding:15px;
background:#f1f7ff;
border-radius:8px;
text-align:left;
}

.error{
margin-top:15px;
color:red;
font-weight:bold;
}

.note{
margin-top:20px;
font-size:14px;
color:#555;
background:#fff8e1;
padding:10px;
border-radius:5px;
}

.marks-badge{
font-size:22px;
font-weight:bold;
padding:8px 14px;
border-radius:20px;
color:white;
}

.good{
background:#28a745;
}

.average{
background:#007bff;
}

.low{
background:#dc3545;
}

</style>
</head>

<body>

<div class="container">

<h2>Check Your CSE472 & CSP472 CA Marks (Only of Section - C)</h2>

<select id="courseType" onchange="updateComponents()">
<option value="">Select Type</option>
<option value="theory">Theory CA</option>
<option value="lab">Lab Marks</option>
</select>

<select id="component">
<option value="">Select Component</option>
</select>

<input type="text" id="systemId" placeholder="Enter SYSTEM ID">

<button onclick="getMarks()">Check</button>

<div id="result"></div>

<div class="note">
<b>Note:</b> The marks displayed here are for reference only.  
Please refer to the University Academic Portal for final marks as per official weightage.
</div>

</div>

<script>

function updateComponents(){

var type=document.getElementById("courseType").value;
var comp=document.getElementById("component");

comp.innerHTML="<option value=''>Select Component</option>";

if(type=="theory"){

comp.innerHTML+=`<option value="Assignment-1 Marks (20)">Assignment-1</option>`;
comp.innerHTML+=`<option value="Assignment-2 Marks (20)">Assignment-2</option>`;
comp.innerHTML+=`<option value="Assessment-1 Marks (20)">Assessment-1</option>`;
comp.innerHTML+=`<option value="Assessment-2 Marks (20)">Assessment-2</option>`;

}

if(type=="lab"){

comp.innerHTML+=`<option value="CA (30)">Lab CA (30)</option>`;
comp.innerHTML+=`<option value="CE (30)">Lab CE (30)</option>`;

}

}

function getMarks(){

var id=document.getElementById("systemId").value.trim();
var component=document.getElementById("component").value;
var type=document.getElementById("courseType").value;
var resultDiv=document.getElementById("result");

if(id==""||component==""||type==""){
resultDiv.innerHTML="<div class='error'>Please select type, component and enter SYSTEM ID.</div>";
return;
}

var sheetURL="";

if(type=="theory"){
sheetURL="https://docs.google.com/spreadsheets/d/1p5_2LFB5UG3_SQnxPIYF1vg49VwEHjOSAEt1PJqUECk/gviz/tq?tqx=out:json";
}

if(type=="lab"){
sheetURL="https://docs.google.com/spreadsheets/d/1a0W4vwBtbDDVphS9MJutiWC12_DJpa0WxrBOBHaMiXY/gviz/tq?tqx=out:json";
}

fetch(sheetURL)
.then(response=>response.text())
.then(text=>{

var json=JSON.parse(text.substr(47).slice(0,-2));
var rows=json.table.rows;
var found=null;

rows.forEach(r=>{
if(r.c[0] && r.c[0].v==id){
found=r;
}
});

if(!found){
resultDiv.innerHTML="<div class='error'>No record found!</div>";
return;
}

var name=found.c[1]?found.c[1].v:"";
var submissionLink = found.c[6] ? found.c[6].v : "";

var marks="";

if(component=="Assignment-1 Marks (20)") marks=found.c[2]?.v;
if(component=="Assignment-2 Marks (20)") marks=found.c[3]?.v;
if(component=="Assessment-1 Marks (20)") marks=found.c[4]?.v;
if(component=="Assessment-2 Marks (20)") marks=found.c[5]?.v;

if(component=="CA (30)") marks=found.c[2]?.v;
if(component=="CE (30)") marks=found.c[3]?.v;

if(marks === undefined || marks === null || marks === ""){
resultDiv.innerHTML="<div class='error'>Marks not available.</div>";
return;
}

var maxMarks = 20;
if(component.includes("(30)")) maxMarks = 30;

var percent = (marks / maxMarks) * 100;

var gradeClass = "average";
if(percent >= 75) gradeClass = "good";
else if(percent < 50) gradeClass = "low";

resultDiv.innerHTML = `
<div class="result-card">

<b>SYSTEM ID:</b> ${id}<br><br>

<b>STUDENT NAME:</b> ${name}<br><br>

<b>${component}:</b> 
<span class="marks-badge ${gradeClass}">
${marks} / ${maxMarks}
</span>

<br><br>

${submissionLink ? `
<a href="${submissionLink}" target="_blank">
<button style="background:#28a745;">View Submission</button>
</a>
` : `<span style="color:#888;">Submission link not available</span>`}

</div>
`;

})
.catch(error=>{
resultDiv.innerHTML="<div class='error'>Error fetching data.</div>";
});

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Check Your CSE472 CA Marks</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            text-align: center;
            padding: 50px;
        }

        .container {
            background: #ffffff;
            padding: 30px;
            width: 480px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 20px;
        }

        input, select {
            padding: 10px;
            width: 90%;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 25px;
            background: #004aad;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #003080;
        }

        .result-card {
            margin-top: 20px;
            padding: 15px;
            background: #f1f7ff;
            border-radius: 8px;
            text-align: left;
        }

        .error {
            margin-top: 15px;
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Check Your CSE472 CA Marks (Only of Section-C)</h2>

    <select id="component">
        <option value="">Select Component</option>
        <option value="Assignmnet-1 Marks (20)">Assignment-1</option>
        <option value="Assessment-1 Marks(20)">Assessment-1</option>
    </select>

    <input type="text" id="systemId" placeholder="Enter SYSTEM ID">

    <button onclick="getMarks()">Check</button>

    <div id="result"></div>
</div>

<script>
function getMarks() {

    var id = document.getElementById("systemId").value.trim();
    var component = document.getElementById("component").value;
    var resultDiv = document.getElementById("result");

    if(id === "" || component === ""){
        resultDiv.innerHTML = "<div class='error'>Please select component and enter ID.</div>";
        return;
    }

    fetch("https://docs.google.com/spreadsheets/d/1p5_2LFB5UG3_SQnxPIYF1vg49VwEHjOSAEt1PJqUECk/gviz/tq?tqx=out:json")
    .then(response => response.text())
    .then(text => {

        // convert Google response to JSON
        var json = JSON.parse(text.substr(47).slice(0, -2));
        var rows = json.table.rows;

        // find student
        var found = null;
        rows.forEach(r => {
            if(r.c[0] && r.c[0].v == id){
                found = r;
            }
        });

        if(!found) {
            resultDiv.innerHTML = "<div class='error'>No record found.</div>";
            return;
        }

        // mapping columns
        var name = found.c[1] ? found.c[1].v : "";
        var marks = "";
        if(component === "Assignmnet-1 Marks (20)") {
            marks = found.c[2] ? found.c[2].v : "";
        } else if(component === "Assessment-1 Marks(20)") {
            marks = found.c[3] ? found.c[3].v : "";
        }

        if(marks === "") {
            resultDiv.innerHTML = "<div class='error'>No marks available.</div>";
            return;
        }

        resultDiv.innerHTML = `
            <div class="result-card">
                <b>SYSTEM ID:</b> ${id}<br><br>
                <b>STUDENT NAME:</b> ${name}<br><br>
                <b>${component}:</b> ${marks}
            </div>
        `;

    })
    .catch(err => {
        resultDiv.innerHTML = "<div class='error'>Error fetching data.</div>";
    });
}
</script>

</body>
</html>

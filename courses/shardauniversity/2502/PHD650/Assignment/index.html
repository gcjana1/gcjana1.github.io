<!DOCTYPE html>
<html>
<head>
<title>Assignment Submission Portal</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 0;
}

.header {
    background: #2c3e50;
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
}

.container {
    background: white;
    width: 420px;
    margin: 40px auto;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0px 0px 15px rgba(0,0,0,0.1);
}

.form-title {
    text-align: center;
    font-size: 20px;
    margin-bottom: 20px;
    font-weight: bold;
}

.form-input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
}

.submit-btn {
    width: 100%;
    padding: 12px;
    background: #27ae60;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
}

.submit-btn:hover {
    background: #219150;
}

.success-message {
    display: none;
    text-align: center;
    color: green;
    font-weight: bold;
    margin-top: 15px;
}
</style>

<script>
function redirectToForm() {

    let name = document.getElementById("name").value.trim();
    let systemid = document.getElementById("systemid").value.trim();
    let mobile = document.getElementById("mobile").value.trim();

    if(name === "" || systemid === "" || mobile === "") {
        alert("Please fill all fields!");
        return;
    }

    // Google Form prefilled URL
    let formURL = "https://docs.google.com/forms/d/e/1FAIpQLSdwf6NG0sqDYfbhv3r-r5898DzdUFT5AomS-GcMtzMXbwrn8g/viewform?" +
        "entry.692143995=" + encodeURIComponent(name) +
        "&entry.2041742792=" + encodeURIComponent(systemid) +
        "&entry.2004649233=" + encodeURIComponent(mobile);

    // Open Google Form in new tab
    window.open(formURL, "_blank");

    // Show success message
    document.getElementById("form-container").style.display = "none";
    document.getElementById("success").style.display = "block";
}
</script>

</head>

<body>

<div class="header">
Assignment Submission Portal (PHD650)
</div>

<div class="container" id="form-container">

<div class="form-title">Submit Your Assignment</div>

<form onsubmit="redirectToForm(); return false;">

<input type="text" id="name" placeholder="Student Name" class="form-input" required>

<input type="text" id="systemid" placeholder="System ID" class="form-input" required>

<input type="tel" id="mobile" placeholder="Mobile Number" class="form-input" required>

<label><b>Upload Assignment (PDF)</b></label>
<p style="font-size:13px;color:#555;">
You will be redirected to Google Form to upload your PDF.
</p>

<button type="submit" class="submit-btn">Proceed to Upload</button>

</form>

</div>

<div class="container success-message" id="success">
✅ Your details have been recorded!<br><br>
👉 Please complete PDF upload in the opened Google Form.<br><br>
You may close this page after submission.
</div>

</body>
</html>
